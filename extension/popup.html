<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      color: #333;
      font-size: 14px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .field input:focus {
      outline: none;
      border-color: #005eb8;
      box-shadow: 0 0 0 2px rgba(0, 94, 184, 0.2);
    }
    .field input:disabled,
    .field select:disabled {
      background: #f5f5f5;
      color: #999;
    }
    .field select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background: #fff;
    }
    .field select:focus {
      outline: none;
      border-color: #005eb8;
      box-shadow: 0 0 0 2px rgba(0, 94, 184, 0.2);
    }

    .status {
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status.idle {
      background: #f0f0f0;
      color: #666;
    }
    .status.recording {
      background: #fce4e4;
      color: #d4351c;
    }
    .status.recording::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #d4351c;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #005eb8;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #004d99;
    }
    .btn-danger {
      background: #d4351c;
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) {
      background: #b52f18;
    }

    .result {
      display: none;
      padding: 10px;
      border-radius: 4px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 12px;
      margin-top: 12px;
    }
    .result.visible { display: block; }

    .error {
      display: none;
      padding: 10px;
      border-radius: 4px;
      background: #fce4e4;
      color: #d4351c;
      font-size: 12px;
      margin-top: 12px;
    }
    .error.visible { display: block; }

    .tab-info {
      font-size: 11px;
      color: #999;
      margin-bottom: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>Prototype Map</h1>

  <div class="tab-info" id="tabInfo">No tab selected</div>

  <div class="field">
    <label for="project">Project</label>
    <select id="project">
      <option value="">Loading...</option>
    </select>
  </div>

  <div class="field">
    <label for="name">Journey name</label>
    <input type="text" id="name" placeholder="e.g. Adding availability">
  </div>

  <div class="field">
    <label for="port">Server port</label>
    <input type="number" id="port" value="4444" min="1" max="65535">
  </div>

  <div class="status idle" id="status">Idle</div>

  <button class="btn btn-primary" id="startBtn">Start recording</button>
  <button class="btn btn-danger" id="stopBtn" style="display:none">Stop recording</button>

  <div class="result" id="result"></div>
  <div class="error" id="error"></div>

  <script src="popup.js"></script>
</body>
</html>
